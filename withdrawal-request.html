<!DOCTYPE html>
<html>
<head>
    <title>Withdraw</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="service-card">

<h2>Withdrawal Request</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<input type="text" id="bank" placeholder="Your Bank Name">

<input type="text" id="accountName" placeholder="Account Name">

<input type="text" id="accountNumber" placeholder="Account Number">

<button onclick="submitWithdrawal()">
Submit Withdrawal
</button>

</div>

<script>
  let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (!currentUser.depositVerified) {
    alert("Please make your first deposit to unlock this feature.");
    window.location.href = "deposit.html";
}

function submitWithdrawal(){

    let amount = document.getElementById("amount").value;
    let bank = document.getElementById("bank").value;
    let accountName = document.getElementById("accountName").value;
    let accountNumber = document.getElementById("accountNumber").value;

    if(amount=="" || bank=="" || accountNumber==""){

        alert("Please complete all required fields.");

        return;

    }
  let balance = Number(localStorage.getItem("balance")) || 0;

if (Number(amount) > balance) {
    alert("Insufficient balance. You cannot withdraw more than your available balance.");
    return;
}

if (Number(amount) <= 0) {
    alert("Please enter a valid withdrawal amount.");
    return;
}

    let withdrawals =
    JSON.parse(localStorage.getItem("withdrawals")) || [];

    withdrawals.push({

        fullname: localStorage.getItem("fullname"),

        amount: amount,

        bank: bank,

        accountName: accountName,

        accountNumber: accountNumber,

        status:"Pending"

    });

    localStorage.setItem(
        "withdrawals",
        JSON.stringify(withdrawals)
    );

    alert("Withdrawal request submitted successfully.");

}

</script>

</body>
</html>
